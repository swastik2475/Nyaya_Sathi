<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NyayaSathi – Legal AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="logo">
          <div class="logo-icon">⚖️</div>
          <div>
            <div class="logo-name">NyayaSathi</div>
            <div class="logo-sub">Indian Legal AI</div>
          </div>
        </div>
      </div>

      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="7" y1="1" x2="7" y2="13" />
          <line x1="1" y1="7" x2="13" y2="7" />
        </svg>
        New conversation
      </button>

      <div class="sidebar-section">Recent</div>
      <div class="sidebar-body" id="historyList"></div>

      <div class="sidebar-footer">
        <div class="provider-badge">
          <div class="provider-dot"></div>
          <div class="provider-info">
            <div class="provider-name">Groq API</div>
            <div class="provider-model">llama-3.1-70b-versatile</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-title">Legal Assistant</div>
        <div class="topbar-tags">
          <button class="tag on" onclick="toggleTag(this)">Criminal</button>
          <button class="tag" onclick="toggleTag(this)">Civil</button>
          <button class="tag" onclick="toggleTag(this)">Family</button>
          <button class="tag" onclick="toggleTag(this)">RTI</button>
          <button class="tag" onclick="toggleTag(this)">Cyber</button>
        </div>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="chat-area-inner" id="chatInner">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">⚖️</div>
            <div class="empty-title">Sabko Nyay, Har Ghar Nyaya</div>
            <div class="empty-sub">Ask any question about Indian law — FIR, rights, schemes, IPC sections</div>
            <div class="suggestions">
              <button class="suggestion" onclick="fillInput('How do I file an FIR online?')">
                <div class="suggestion-label">Criminal</div>
                <div class="suggestion-text">How do I file an FIR online?</div>
              </button>
              <button class="suggestion" onclick="fillInput('What is Article 21 Right to Life?')">
                <div class="suggestion-label">Constitution</div>
                <div class="suggestion-text">What is Article 21 Right to Life?</div>
              </button>
              <button class="suggestion" onclick="fillInput('How can I avail Tele-Law free legal advice?')">
                <div class="suggestion-label">Scheme</div>
                <div class="suggestion-text">How to avail Tele-Law free legal advice?</div>
              </button>
              <button class="suggestion" onclick="fillInput('What are my rights if police arrests me?')">
                <div class="suggestion-label">Rights</div>
                <div class="suggestion-text">What are my rights if police arrests me?</div>
              </button>
            </div>
          </div>
          <div id="messages"></div>
        </div>
      </div>

      <div class="input-zone">
        <div class="input-wrap">
          <div class="input-row">
            <textarea id="userInput" placeholder="Ask your legal question in English or Hindi…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 13.5L8 2L14 13.5L8 10.5L2 13.5Z" />
              </svg>
            </button>
          </div>
          <div class="input-hint">
            <span><kbd class="kbd">Enter</kbd> to send</span>
            <span><kbd class="kbd">Shift+Enter</kbd> new line</span>
            <span>🔒 Not legal advice — consult a lawyer for serious matters</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="scripts/app.js" defer></script>
</body>
</html>
